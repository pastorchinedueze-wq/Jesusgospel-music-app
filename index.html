<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jesus Gospel Music</title>

<!-- ✅ PWA MANIFEST -->
<link rel="manifest" href="manifest.json">

<style>
body {
  margin:0; font-family:Arial;
  background:#000; color:white;
}

.header {
  background:#ff4da6;
  padding:15px; text-align:center;
  font-size:20px; font-weight:bold;
}

.upload-btn {
  display:block; margin:10px;
  padding:10px; background:#ff4da6;
  color:white; text-align:center;
  border-radius:10px; text-decoration:none;
}

.card {
  background:#111; margin:10px;
  padding:10px; border-radius:10px;
}

.title { color:#ff4da6; }

iframe {
  width:100%; height:200px;
  border-radius:10px;
}

.like {
  background:#ff4da6; border:none;
  padding:6px 10px; border-radius:6px;
  color:white; margin-top:5px;
}
</style>

</head>

<body>

<div class="header">🎶 Gospel Music</div>

<a class="upload-btn" href="https://docs.google.com/forms/d/e/1FAIpQLSd13X-aQk07h_aducHgEJ2t-aaSk1ZIje6x7uyj-W8sGu7qHQ/viewform">
📤 Upload Song
</a>

<input id="search" placeholder="Search..." style="width:90%;margin:10px;padding:10px;border-radius:8px;border:none;">

<div id="music"></div>

<script>
const sheetURL = "https://opensheet.elk.sh/1_D1PStr46kkrBKK7LnBywlW1ukSaoqoDpSaA0U4UB5U/Form%20Responses%201";

let songs = [];

function getYouTubeID(url) {
  const regExp = /(?:youtube\\.com.*v=|youtu\\.be\\/)([^&]+)/;
  const match = url.match(regExp);
  return match ? match[1] : null;
}

async function loadSongs(){
  const res = await fetch(sheetURL);
  songs = await res.json();
  songs.reverse();
  displaySongs(songs);
}

function displaySongs(list){
  const div = document.getElementById("music");
  div.innerHTML = "";

  list.forEach(song=>{
    let title = song["Song Title"]||"";
    let artist = song["Artist Name"]||"";
    let youtube = song["YouTube Link"]||"";
    let id = getYouTubeID(youtube);

    if(!id) return;

    div.innerHTML += `
    <div class="card">
      <h3 class="title">${title}</h3>
      <p>${artist}</p>
      <iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>
      <button class="like" onclick='like(${JSON.stringify(song)})'>❤️ Like</button>
    </div>`;
  });
}

// FAVORITES
function like(song){
  let fav = JSON.parse(localStorage.getItem("fav")||"[]");
  fav.push(song);
  localStorage.setItem("fav", JSON.stringify(fav));
  alert("Saved ❤️");
}

// SEARCH
document.getElementById("search").addEventListener("input", e=>{
  let v = e.target.value.toLowerCase();
  let filtered = songs.filter(s=>
    (s["Song Title"]||"").toLowerCase().includes(v) ||
    (s["Artist Name"]||"").toLowerCase().includes(v)
  );
  displaySongs(filtered);
});

loadSongs();

// ✅ SERVICE WORKER REGISTERED HERE
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
