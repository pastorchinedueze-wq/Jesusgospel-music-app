<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jesus Is Coming Chat</title>

<style>
body{
margin:0;
font-family:Arial;
background:black;
color:white;
}

.header{
background:#ff1493;
padding:20px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.status{
text-align:center;
padding:10px;
background:#111;
color:lime;
font-size:18px;
}

#messages{
height:65vh;
overflow-y:auto;
padding:10px;
}

.msg{
background:#111;
padding:10px;
margin:10px 0;
border-radius:10px;
}

.name{
color:#ff1493;
font-weight:bold;
}

.time{
font-size:12px;
color:gray;
margin-top:5px;
}

.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#111;
padding:10px;
box-sizing:border-box;
}

.bottom input{
padding:15px;
border:none;
border-radius:10px;
margin-right:5px;
font-size:16px;
}

#name{
width:25%;
}

#message{
flex:1;
}

button{
background:#ff1493;
color:white;
border:none;
padding:15px;
border-radius:10px;
font-size:16px;
}
</style>
</head>

<body>

<div class="header">✝️ Jesus Is Coming Chat</div>

<div class="status">🟢 Live Chat Online</div>

<div id="messages"></div>

<div class="bottom">
<input type="text" id="name" placeholder="Name">
<input type="text" id="message" placeholder="Type message">
<button onclick="sendMessage()">Send</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
query,
orderBy,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDg7jv9EhDE9qb_6hIrKxVKjCLUX_hGlQU",
authDomain: "jesus-is-coming-gospel.firebaseapp.com",
projectId: "jesus-is-coming-gospel",
storageBucket: "jesus-is-coming-gospel.firebasestorage.app",
messagingSenderId: "917609067173",
appId: "1:917609067173:web:b2bc8b90628f32620f534c",
measurementId: "G-LZZXBJ0NR0"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const messagesDiv = document.getElementById("messages");

window.sendMessage = async function(){

const name = document.getElementById("name").value;
const message = document.getElementById("message").value;

if(!name || !message) return;

await addDoc(collection(db,"messages"),{
name:name,
message:message,
time:Date.now()
});

document.getElementById("message").value="";
};

const q = query(collection(db,"messages"), orderBy("time"));

onSnapshot(q,(snapshot)=>{

messagesDiv.innerHTML="";

snapshot.forEach((doc)=>{

const data = doc.data();

messagesDiv.innerHTML += `
<div class="msg">
<div class="name">${data.name}</div>
<div>${data.message}</div>
<div class="time">
${new Date(data.time).toLocaleString()}
</div>
</div>
`;

});

messagesDiv.scrollTop = messagesDiv.scrollHeight;

});

</script>

</body>
</html>
