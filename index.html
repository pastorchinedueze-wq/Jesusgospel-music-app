<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jesus Is Coming Live Chat</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:white;
}

.header{
background:#ff1493;
padding:18px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.online{
text-align:center;
padding:5px;
background:#111;
color:lime;
font-size:14px;
}

#chat{
height:60vh;
overflow-y:auto;
padding:10px;
}

.message{
background:#111;
padding:10px;
margin:10px;
border-radius:12px;
}

.name{
color:#ff1493;
font-weight:bold;
margin-bottom:5px;
}

.time{
font-size:11px;
color:gray;
margin-top:5px;
}

.input-area{
position:fixed;
bottom:0;
width:100%;
background:#111;
padding:10px;
display:flex;
gap:5px;
box-sizing:border-box;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
}

button{
background:#ff1493;
border:none;
color:white;
padding:12px 18px;
border-radius:10px;
font-weight:bold;
}

.admin{
border-left:4px solid gold;
background:#221100;
}
</style>

</head>
<body>

<div class="header">
✝️ Jesus Is Coming Chat
</div>

<div class="online">
🟢 Live Chat Online
</div>

<div id="chat"></div>

<div class="input-area">
<input type="text" id="name" placeholder="Your name">
<input type="text" id="message" placeholder="Type message...">
<button onclick="sendMessage()">Send</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
query,
orderBy,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDg7jv9EhDE9qb_6hIrKxVKjCLUX_hGlQU",
  authDomain: "jesus-is-coming-gospel.firebaseapp.com",
  projectId: "jesus-is-coming-gospel",
  storageBucket: "jesus-is-coming-gospel.firebasestorage.app",
  messagingSenderId: "917609067173",
  appId: "1:917609067173:web:b2bc8b90628f32620f534c",
  measurementId: "G-LZZXBJ0NR0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const chatDiv = document.getElementById("chat");

window.sendMessage = async function(){

const name = document.getElementById("name").value;
const message = document.getElementById("message").value;

if(!name || !message){
alert("Enter name and message");
return;
}

await addDoc(collection(db,"messages"),{
name:name,
message:message,
time:Date.now()
});

document.getElementById("message").value = "";

};

const q = query(
collection(db,"messages"),
orderBy("time")
);

onSnapshot(q,(snapshot)=>{

chatDiv.innerHTML = "";

snapshot.forEach((doc)=>{

const data = doc.data();

let adminClass = "";

if(
data.name.toLowerCase().includes("apostle") ||
data.name.toLowerCase().includes("admin") ||
data.name.toLowerCase().includes("pastor")
){
adminClass = "admin";
}

chatDiv.innerHTML += `
<div class="message ${adminClass}">
<div class="name">${data.name}</div>
<div>${data.message}</div>
<div class="time">
${new Date(data.time).toLocaleString()}
</div>
</div>
`;

});

chatDiv.scrollTop = chatDiv.scrollHeight;

});

</script>

</body>
</html>
