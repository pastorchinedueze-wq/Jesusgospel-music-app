<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gospel Music</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: white;
}

.header {
  text-align: center;
  padding: 15px;
  background: #ff4da6;
  font-size: 20px;
}

.upload-btn {
  margin: 10px;
  padding: 12px;
  background: #ff4da6;
  text-align: center;
  border-radius: 10px;
}

.card {
  background: #111;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="header">🎶 Gospel Music</div>

<div class="upload-btn" onclick="openForm()">📤 Upload Song</div>

<div id="music"></div>

<script>

// FORM LINK
function openForm(){
  window.open("https://docs.google.com/forms/d/e/1FAIpQLSd13X-aQk07h_aducHgEJ2t-aaSk1ZIje6x7uyj-W8sGu7qHQ/viewform");
}

// SHEET API
const API_URL = "https://opensheet.elk.sh/1_D1PStr46kkrBKK7LnBywlW1ukSaoqoDpSaA0U4UB5U/Form%20Responses%201";

// LOAD SONGS
function loadSongs(){

fetch(API_URL)
.then(res => res.json())
.then(data => {

let output = "";

data.reverse().forEach(song => {

// 🔥 FIX COLUMN NAMES (WITH SPACE)
let title = song["Song Title "] || "No Title";
let artist = song["Artist Name "] || "Unknown";
let audio = song["Audio Link (mp3) "] || "";
let cover = song["Cover Image URL "] || "";

// 🔥 FIX GOOGLE DRIVE AUDIO
if(audio.includes("drive.google.com")){
let id = audio.split("id=")[1];
audio = "https://drive.google.com/uc?export=view&id=" + id;
}

// 🔥 FIX IMAGE
if(cover.includes("drive.google.com")){
let id = cover.split("id=")[1];
cover = "https://drive.google.com/uc?export=view&id=" + id;
}

if(!audio) return;

output += `
<div class="card">
<img src="${cover}" style="width:100%;border-radius:10px">
<h3>${title}</h3>
<p>${artist}</p>
<audio controls src="${audio}"></audio>
</div>
`;

});

document.getElementById("music").innerHTML = output;

});
}

// FIRST LOAD
loadSongs();

// AUTO REFRESH
setInterval(loadSongs, 5000);

</script>

</body>
</html>
