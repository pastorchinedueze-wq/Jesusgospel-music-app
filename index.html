<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jesus Gospel Music</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg, #000000, #1a0010);
  color: #ff4da6;
}

.header {
  text-align: center;
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
  background: linear-gradient(90deg,#ff0080,#ff4da6);
  color: white;
}

.upload-btn {
  background: #ff4da6;
  margin: 10px;
  padding: 12px;
  border-radius: 10px;
  text-align: center;
  font-weight: bold;
  cursor: pointer;
  color: white;
}

.search {
  padding: 10px;
}
.search input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
}

.container {
  padding: 10px;
}

.card {
  background: #111;
  margin-bottom: 12px;
  border-radius: 12px;
  padding: 10px;
  border: 1px solid #ff4da6;
}

.card img {
  width: 100%;
  height: 180px;
  border-radius: 10px;
  object-fit: cover;
}

.title {
  font-size: 18px;
  font-weight: bold;
  margin-top: 8px;
}

.artist {
  font-size: 14px;
  color: #ccc;
  margin-bottom: 6px;
}

audio {
  width: 100%;
  margin-top: 5px;
}
</style>
</head>

<body>

<div class="header">🎶 Gospel Music</div>

<div class="upload-btn" onclick="openUpload()">
📤 Upload Song
</div>

<div class="search">
<input type="text" id="search" placeholder="Search..." onkeyup="filterSongs()">
</div>

<div class="container" id="music">Loading songs...</div>

<script>

let songsData = [];

function getField(song, names) {
  for (let key in song) {
    let clean = key.toLowerCase().replace(/[^a-z]/g,"");
    for (let n of names) {
      if (clean.includes(n)) return song[key];
    }
  }
  return "";
}

fetch("https://opensheet.elk.sh/187agKNaRAZWV26XNhn8RUy5kIIiCavmY2f1RqW-YIgA/Form%20Responses%201")
.then(res => res.json())
.then(data => {
  songsData = data.reverse();
  displaySongs(songsData);
})
.catch(() => {
  document.getElementById("music").innerHTML = "❌ Failed to load songs";
});

function displaySongs(data) {
  let output = "";

  data.forEach(song => {
    let title = getField(song, ["songtitle","title"]) || "No Title";
    let artist = getField(song, ["artistname","artist"]) || "Unknown";
    let audio = getField(song, ["audiolink","mp3"]);
    let cover = getField(song, ["coverimage","image"]);

    if (!audio) return;

    output += `
      <div class="card">
        <img src="${cover || 'https://via.placeholder.com/300'}">
        <div class="title">${title}</div>
        <div class="artist">${artist}</div>
        <audio controls src="${audio}"></audio>
      </div>
    `;
  });

  document.getElementById("music").innerHTML = output || "No valid songs found";
}

function filterSongs() {
  let val = document.getElementById("search").value.toLowerCase();

  let filtered = songsData.filter(song =>
    JSON.stringify(song).toLowerCase().includes(val)
  );

  displaySongs(filtered);
}

function openUpload() {
  window.open("https://docs.google.com/forms/d/e/1FAIpQLSd13X-aQk07h_aducHgEJ2t-aaSk1ZIje6x7uyj-W8sGu7qHQ/viewform", "_blank");
}

</script>

</body>
</html>
